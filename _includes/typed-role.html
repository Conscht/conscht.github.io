<script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var el = document.getElementById("typed-role");
    if (!el) return;

    new Typed("#typed-role", {
      strings: [
        "Yo, I’m Conscht",
        "I work on Computer Vision",
        "I explore Signal Processing and Representation Learning"
      ],
      typeSpeed: 55,
      backSpeed: 30,
      backDelay: 1400,
      loop: true,
      smartBackspace: true,
      showCursor: true,
      cursorChar: "|"
    });
  });
</script>

<style>
  #typed-role {
    font-weight: 600;
  }
  .typed-cursor {
    font-weight: 600;
  }
</style>
